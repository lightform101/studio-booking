<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>場地相簿 · LightForm Studio</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary: #1A1A1A;
      --accent:  #B07D5A;
      --gold:    #C4956A;
      --light:   #FAFAF8;
      --cream:   #F5F0EB;
      --gray:    #8A8580;
      --border:  #E8E4DF;
      --text:    #1A1A1A;
      --radius:  14px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans TC', sans-serif; background: var(--light); color: var(--text); }

    /* NAV */
    nav {
      position: sticky; top: 0; z-index: 99;
      background: rgba(250,250,248,0.96); backdrop-filter: blur(12px);
      height: 64px; display: flex; align-items: center; justify-content: space-between;
      padding: 0 5%; border-bottom: 1px solid var(--border);
    }
    .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .nav-logo .logo-icon { width:36px;height:36px;border-radius:8px;overflow:hidden;display:flex;align-items:center;justify-content:center; }
    .nav-logo .logo-icon img { width:100%;height:100%;object-fit:contain; }
    .nav-logo span { color:var(--primary); font-family:'DM Mono',monospace; font-size:1rem; font-weight:500; letter-spacing:0.06em; }
    .back-link { color:var(--gray); text-decoration:none; font-size:.85rem; transition:color .2s; }
    .back-link:hover { color:var(--primary); }

    /* HERO */
    .gallery-hero {
      padding: 48px 5% 32px;
      max-width: 1080px; margin: 0 auto;
    }
    .studio-tag {
      display: inline-block;
      background: rgba(176,125,90,0.12); color: var(--accent);
      padding: 5px 14px; border-radius: 20px;
      font-size: 0.72rem; font-weight: 600; letter-spacing: 0.1em;
      text-transform: uppercase; margin-bottom: 14px;
    }
    .gallery-title {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      font-weight: 400; line-height: 1.2; margin-bottom: 12px;
    }
    .gallery-desc {
      font-size: .9rem; color: var(--gray); max-width: 560px;
      line-height: 1.8; font-weight: 300;
    }
    .gallery-meta {
      display: flex; gap: 20px; margin-top: 20px; flex-wrap: wrap;
    }
    .meta-item {
      font-size: .82rem; color: var(--gray);
      display: flex; align-items: center; gap: 6px;
    }
    .meta-item strong { color: var(--text); }

    .gallery-actions {
      display: flex; gap: 12px; margin-top: 28px; flex-wrap: wrap;
    }
    .btn-book {
      background: var(--primary); color: #fff;
      border: none; border-radius: 9px;
      padding: 12px 28px; font-size: .9rem; font-weight: 600;
      cursor: pointer; text-decoration: none; display: inline-flex;
      align-items: center; gap: 8px; transition: opacity .2s;
      font-family: inherit;
    }
    .btn-book:hover { opacity: .82; }
    .btn-outline {
      background: #fff; color: var(--primary);
      border: 1.5px solid var(--border); border-radius: 9px;
      padding: 12px 24px; font-size: .9rem; font-weight: 500;
      cursor: pointer; text-decoration: none; display: inline-flex;
      align-items: center; gap: 8px; transition: all .2s;
      font-family: inherit;
    }
    .btn-outline:hover { border-color: var(--primary); }

    /* FEATURES */
    .features-row {
      display: flex; flex-wrap: wrap; gap: 8px; margin-top: 20px;
    }
    .feature-tag {
      font-size: .75rem; color: var(--gray);
      background: var(--cream); border: 1px solid var(--border);
      padding: 4px 12px; border-radius: 20px;
    }

    /* DIVIDER */
    .divider { border: none; border-top: 1px solid var(--border); margin: 0 5%; }

    /* PHOTO GRID */
    .gallery-section {
      max-width: 1080px; margin: 0 auto;
      padding: 40px 5% 80px;
    }
    .gallery-count {
      font-size: .82rem; color: var(--gray); margin-bottom: 20px;
      font-family: 'DM Mono', monospace;
    }
    .photo-grid {
      columns: 3; column-gap: 12px;
    }
    @media (max-width: 720px) { .photo-grid { columns: 2; } }
    @media (max-width: 480px) { .photo-grid { columns: 1; } }
    .photo-item {
      break-inside: avoid; margin-bottom: 12px;
      border-radius: 10px; overflow: hidden;
      cursor: pointer; position: relative;
      transition: transform .2s;
    }
    .photo-item:hover { transform: scale(1.01); }
    .photo-item img {
      width: 100%; display: block;
      border-radius: 10px; background: var(--cream);
    }
    .photo-item .main-badge {
      position: absolute; top: 8px; left: 8px;
      background: var(--accent); color: #fff;
      font-size: .65rem; font-weight: 700;
      padding: 2px 8px; border-radius: 4px; letter-spacing: .04em;
    }
    .empty-state {
      text-align: center; padding: 80px 20px; color: var(--gray);
    }
    .empty-state .icon { font-size: 3rem; margin-bottom: 16px; }
    .empty-state p { font-size: .9rem; }

    /* LIGHTBOX */
    .lightbox {
      display: none; position: fixed; inset: 0; z-index: 9999;
      background: rgba(0,0,0,.92); align-items: center; justify-content: center;
    }
    .lightbox.open { display: flex; }
    .lightbox img {
      max-width: 92vw; max-height: 88vh;
      border-radius: 8px; object-fit: contain;
    }
    .lb-close {
      position: absolute; top: 20px; right: 28px;
      color: #fff; font-size: 2rem; cursor: pointer; line-height: 1;
      opacity: .7; transition: opacity .2s;
    }
    .lb-close:hover { opacity: 1; }
    .lb-prev, .lb-next {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: rgba(255,255,255,.12); color: #fff;
      border: none; border-radius: 50%;
      width: 44px; height: 44px; font-size: 1.1rem;
      cursor: pointer; transition: background .2s;
    }
    .lb-prev:hover, .lb-next:hover { background: rgba(255,255,255,.25); }
    .lb-prev { left: 20px; }
    .lb-next { right: 20px; }
    .lb-counter {
      position: absolute; bottom: 20px; left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,.6); font-size: .8rem;
      font-family: 'DM Mono', monospace;
    }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html">
    <div class="logo-icon"><img src="logo.png" alt="Logo"></div>
    <span>LightForm Studio</span>
  </a>
  <a class="back-link" href="index.html#studios">← 返回場地介紹</a>
</nav>

<!-- HERO INFO -->
<div class="gallery-hero">
  <div class="studio-tag" id="g-tag">📷 場地相簿</div>
  <h1 class="gallery-title" id="g-name">載入中...</h1>
  <p class="gallery-desc" id="g-desc"></p>
  <div class="gallery-meta" id="g-meta"></div>
  <div class="features-row" id="g-features"></div>
  <div class="gallery-actions" id="g-actions"></div>
</div>

<hr class="divider" />

<!-- PHOTO GRID -->
<div class="gallery-section">
  <div class="gallery-count" id="g-count"></div>
  <div class="photo-grid" id="photo-grid">
    <div class="empty-state">
      <div class="icon">⏳</div>
      <p>載入照片中...</p>
    </div>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <span class="lb-close" onclick="closeLightbox()">✕</span>
  <button class="lb-prev" onclick="lbPrev(event)">◀</button>
  <img id="lb-img" src="" alt="" />
  <button class="lb-next" onclick="lbNext(event)">▶</button>
  <div class="lb-counter" id="lb-counter"></div>
</div>

<script>
  // 套用外觀
  (async () => {
    try {
      const r = await fetch('/api/appearance');
      if (!r.ok) return;
      const { data: ap } = await r.json();
      if (!ap) return;
      const root = document.documentElement;
      if (ap.theme_primary)       root.style.setProperty('--primary', ap.theme_primary);
      if (ap.theme_accent)        root.style.setProperty('--accent',  ap.theme_accent);
      if (ap.theme_bg)            root.style.setProperty('--light',   ap.theme_bg);
      if (ap.theme_card_bg)       root.style.setProperty('--card-bg', ap.theme_card_bg);
      if (ap.theme_text)          root.style.setProperty('--text',    ap.theme_text);
      if (ap.theme_border_radius) root.style.setProperty('--radius',  ap.theme_border_radius + 'px');
      if (ap.theme_font) document.body.style.fontFamily = `'${ap.theme_font}', sans-serif`;
    } catch(e) {}
  })();

  let allImages = [];
  let lbIndex  = 0;

  async function loadGallery() {
    const studioId = new URLSearchParams(location.search).get('studio');
    if (!studioId) { location.href = 'index.html'; return; }

    try {
      const r = await fetch(`/api/studios/${studioId}`);
      const { success, data: studio } = await r.json();
      if (!success || !studio) { location.href = 'index.html'; return; }

      // 更新頁面標題
      document.title = `${studio.name} 相簿 · LightForm Studio`;

      // Hero info
      document.getElementById('g-name').textContent = studio.name;
      if (studio.name_en) document.getElementById('g-tag').textContent = `📷 ${studio.name_en}`;
      document.getElementById('g-desc').textContent = studio.description || '';

      // Meta chips
      const meta = [
        studio.size_sqm   ? `📐 ${studio.size_sqm} 坪` : '',
        studio.capacity   ? `👥 最多 ${studio.capacity} 人` : '',
        studio.min_hours  ? `⏱ 最少 ${studio.min_hours} 小時` : '',
      ].filter(Boolean);
      document.getElementById('g-meta').innerHTML = meta.map(m =>
        `<div class="meta-item">${m}</div>`).join('');

      // Features
      if (studio.features && studio.features.length) {
        document.getElementById('g-features').innerHTML = studio.features.map(f =>
          `<span class="feature-tag">${f}</span>`).join('');
      }

      // Actions
      document.getElementById('g-actions').innerHTML = `
        <a class="btn-book" href="booking.html?studio=${studio.id}">📅 預約此場地</a>
        <a class="btn-outline" href="index.html#studios">← 查看其他場地</a>
      `;

      // Photos
      allImages = studio.images || [];
      renderGrid();
    } catch(e) {
      document.getElementById('photo-grid').innerHTML =
        '<div class="empty-state"><div class="icon">⚠️</div><p>無法載入場地資料</p></div>';
    }
  }

  function renderGrid() {
    const grid = document.getElementById('photo-grid');
    const countEl = document.getElementById('g-count');
    if (!allImages.length) {
      countEl.textContent = '';
      grid.innerHTML = `
        <div class="empty-state" style="column-span:all;">
          <div class="icon">📷</div>
          <p>此場地尚未上傳照片</p>
        </div>`;
      return;
    }
    countEl.textContent = `共 ${allImages.length} 張照片`;
    // 主圖排在最前面
    const sorted = [...allImages].sort((a, b) => b.is_main - a.is_main || a.sort_order - b.sort_order);
    grid.innerHTML = sorted.map((img, i) => `
      <div class="photo-item" onclick="openLightbox(${i})">
        ${img.is_main ? '<div class="main-badge">主圖</div>' : ''}
        <img src="${img.url}" alt="${img.alt_text || ''}" loading="lazy" />
      </div>`).join('');
  }

  // Lightbox
  function openLightbox(idx) {
    lbIndex = idx;
    updateLightbox();
    document.getElementById('lightbox').classList.add('open');
  }
  function updateLightbox() {
    const sorted = [...allImages].sort((a, b) => b.is_main - a.is_main || a.sort_order - b.sort_order);
    document.getElementById('lb-img').src = sorted[lbIndex]?.url || '';
    document.getElementById('lb-counter').textContent = `${lbIndex + 1} / ${sorted.length}`;
  }
  function closeLightbox(e) {
    if (e && e.target !== document.getElementById('lightbox') && e.target !== document.querySelector('.lb-close')) return;
    if (e && e.currentTarget !== document.getElementById('lightbox')) return;
    document.getElementById('lightbox').classList.remove('open');
  }
  function lbPrev(e) { e.stopPropagation(); lbIndex = (lbIndex - 1 + allImages.length) % allImages.length; updateLightbox(); }
  function lbNext(e) { e.stopPropagation(); lbIndex = (lbIndex + 1) % allImages.length; updateLightbox(); }
  document.addEventListener('keydown', e => {
    if (!document.getElementById('lightbox').classList.contains('open')) return;
    if (e.key === 'ArrowLeft')  lbPrev({ stopPropagation: () => {} });
    if (e.key === 'ArrowRight') lbNext({ stopPropagation: () => {} });
    if (e.key === 'Escape')     document.getElementById('lightbox').classList.remove('open');
  });

  loadGallery();
</script>
</body>
</html>
