<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>後台登入 · LightForm Studio Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: #1a1a2e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* 背景裝飾 */
    body::before {
      content: '';
      position: absolute;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(233,69,96,0.15) 0%, transparent 70%);
      top: -100px; left: -100px;
      pointer-events: none;
    }
    body::after {
      content: '';
      position: absolute;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(201,168,76,0.1) 0%, transparent 70%);
      bottom: -80px; right: -80px;
      pointer-events: none;
    }

    .login-wrap {
      width: 100%;
      max-width: 420px;
      padding: 20px;
      position: relative;
      z-index: 1;
    }

    /* Logo */
    .login-brand {
      text-align: center;
      margin-bottom: 36px;
    }
    .brand-icon {
      width: 60px; height: 60px;
      background: linear-gradient(135deg, #e94560, #c9184a);
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 14px;
      box-shadow: 0 8px 24px rgba(233,69,96,0.4);
    }
    .brand-name {
      color: #fff;
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 0.03em;
    }
    .brand-sub {
      color: rgba(255,255,255,0.4);
      font-size: 0.82rem;
      margin-top: 4px;
    }

    /* 卡片 */
    .login-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 40px 36px;
      backdrop-filter: blur(20px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .login-title {
      color: #fff;
      font-size: 1.15rem;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .login-desc {
      color: rgba(255,255,255,0.4);
      font-size: 0.83rem;
      margin-bottom: 28px;
    }

    /* 表單 */
    .form-group {
      margin-bottom: 18px;
    }
    .form-label {
      display: block;
      color: rgba(255,255,255,0.65);
      font-size: 0.82rem;
      margin-bottom: 7px;
      font-weight: 500;
    }
    .input-wrap {
      position: relative;
    }
    .input-icon {
      position: absolute;
      left: 14px; top: 50%;
      transform: translateY(-50%);
      font-size: 1rem;
      pointer-events: none;
    }
    .form-input {
      width: 100%;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 12px 14px 12px 42px;
      color: #fff;
      font-size: 0.9rem;
      font-family: inherit;
      outline: none;
      transition: border-color .2s, background .2s;
    }
    .form-input::placeholder { color: rgba(255,255,255,0.25); }
    .form-input:focus {
      border-color: #e94560;
      background: rgba(255,255,255,0.1);
    }
    .form-input.error { border-color: #ff6b6b; }

    /* 顯示/隱藏密碼 */
    .toggle-pass {
      position: absolute;
      right: 14px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      cursor: pointer; color: rgba(255,255,255,0.35);
      font-size: 1rem; padding: 0;
      transition: color .2s;
    }
    .toggle-pass:hover { color: rgba(255,255,255,0.7); }

    /* 錯誤提示 */
    .error-msg {
      color: #ff6b6b;
      font-size: 0.78rem;
      margin-top: 5px;
      display: none;
    }
    .error-msg.show { display: block; }

    /* 登入按鈕 */
    .btn-login {
      width: 100%;
      background: linear-gradient(135deg, #e94560, #c9184a);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 13px;
      font-size: 0.95rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity .2s, transform .15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 4px 16px rgba(233,69,96,0.4);
    }
    .btn-login:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-login:active { transform: translateY(0); }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* 全域錯誤訊息框 */
    .alert {
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 0.85rem;
      margin-bottom: 20px;
      display: none;
      animation: slideIn .3s ease;
    }
    .alert.show { display: flex; align-items: center; gap: 10px; }
    .alert-error { background: rgba(255,107,107,0.15); border: 1px solid rgba(255,107,107,0.3); color: #ff6b6b; }
    .alert-success { background: rgba(40,167,69,0.15); border: 1px solid rgba(40,167,69,0.3); color: #5cb85c; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* 載入動畫 */
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 底部連結 */
    .login-footer {
      text-align: center;
      margin-top: 24px;
      color: rgba(255,255,255,0.3);
      font-size: 0.78rem;
    }
    .login-footer a {
      color: rgba(255,255,255,0.5);
      text-decoration: none;
      transition: color .2s;
    }
    .login-footer a:hover { color: #e94560; }

    /* 已登入提示 */
    .already-in {
      text-align: center;
      color: rgba(255,255,255,0.5);
      font-size: 0.85rem;
      margin-top: 16px;
      display: none;
    }
    .already-in a {
      color: #e94560;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>

<div class="login-wrap">

  <!-- Brand -->
  <div class="login-brand">
    <div class="brand-icon">📷</div>
    <div class="brand-name">LightForm Studio</div>
    <div class="brand-sub">攝影棚預約管理系統</div>
  </div>

  <!-- 登入卡片 -->
  <div class="login-card">
    <div class="login-title">後台管理登入</div>
    <div class="login-desc">請輸入管理員帳號與密碼</div>

    <!-- 錯誤/成功提示 -->
    <div id="alertBox" class="alert alert-error">
      <span id="alertIcon">⚠️</span>
      <span id="alertText"></span>
    </div>

    <form id="loginForm" onsubmit="doLogin(event)">
      <!-- Email -->
      <div class="form-group">
        <label class="form-label">管理員信箱</label>
        <div class="input-wrap">
          <span class="input-icon">📧</span>
          <input type="email" id="email" class="form-input"
            placeholder="admin@studiospace.tw"
            autocomplete="username" required />
        </div>
        <div class="error-msg" id="emailErr">請輸入有效的 Email</div>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label class="form-label">密碼</label>
        <div class="input-wrap">
          <span class="input-icon">🔒</span>
          <input type="password" id="password" class="form-input"
            placeholder="請輸入密碼"
            autocomplete="current-password" required />
          <button type="button" class="toggle-pass" id="togglePass" onclick="togglePassword()">👁</button>
        </div>
        <div class="error-msg" id="passErr">請輸入密碼</div>
      </div>

      <!-- 登入按鈕 -->
      <button type="submit" class="btn-login" id="loginBtn">
        <div class="spinner" id="spinner"></div>
        <span id="btnText">🔑 登入後台</span>
      </button>
    </form>

    <!-- 已登入提示 -->
    <div class="already-in" id="alreadyIn">
      已有登入狀態 → <a href="admin.html">直接進入後台</a>
    </div>
  </div>

  <!-- 底部 -->
  <div class="login-footer">
    <a href="index.html">← 返回前台首頁</a>
    &nbsp;·&nbsp;
    LightForm Studio &copy; 2026
  </div>

</div>

<script>
  // ─── 若已有 token 先驗證是否有效 ───────────────────
  (async () => {
    const token = localStorage.getItem('adminToken');
    if (!token) return;
    try {
      const r = await fetch('/api/admin/auth/me', {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (r.ok) {
        // token 有效，顯示直接進入提示
        document.getElementById('alreadyIn').style.display = 'block';
      }
    } catch(e) {}
  })();

  // ─── 切換密碼顯示 ──────────────────────────────────
  function togglePassword() {
    const inp = document.getElementById('password');
    const btn = document.getElementById('togglePass');
    if (inp.type === 'password') {
      inp.type = 'text';
      btn.textContent = '🙈';
    } else {
      inp.type = 'password';
      btn.textContent = '👁';
    }
  }

  // ─── 顯示 Alert ───────────────────────────────────
  function showAlert(msg, type = 'error') {
    const box  = document.getElementById('alertBox');
    const text = document.getElementById('alertText');
    const icon = document.getElementById('alertIcon');
    box.className = `alert alert-${type} show`;
    icon.textContent = type === 'error' ? '⚠️' : '✅';
    text.textContent = msg;
  }
  function hideAlert() {
    document.getElementById('alertBox').classList.remove('show');
  }

  // ─── 登入邏輯 ─────────────────────────────────────
  async function doLogin(e) {
    e.preventDefault();
    hideAlert();

    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    // 簡單前端驗證
    let valid = true;
    if (!email) {
      document.getElementById('emailErr').classList.add('show');
      document.getElementById('email').classList.add('error');
      valid = false;
    } else {
      document.getElementById('emailErr').classList.remove('show');
      document.getElementById('email').classList.remove('error');
    }
    if (!password) {
      document.getElementById('passErr').classList.add('show');
      document.getElementById('password').classList.add('error');
      valid = false;
    } else {
      document.getElementById('passErr').classList.remove('show');
      document.getElementById('password').classList.remove('error');
    }
    if (!valid) return;

    // 顯示載入中
    const btn     = document.getElementById('loginBtn');
    const spinner = document.getElementById('spinner');
    const btnText = document.getElementById('btnText');
    btn.disabled     = true;
    spinner.style.display = 'block';
    btnText.textContent   = '登入中...';

    try {
      const r = await fetch('/api/admin/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await r.json();

      if (r.ok && data.data?.token) {
        // 儲存 token（API 格式：{ success, data: { token, name, email } }）
        localStorage.setItem('adminToken', data.data.token);
        localStorage.setItem('adminName',  data.data.name || '管理員');

        showAlert('登入成功！正在跳轉...', 'success');
        setTimeout(() => {
          window.location.href = 'admin.html';
        }, 800);
      } else {
        const msg = data.message || '帳號或密碼錯誤，請重試';
        showAlert(msg);
        document.getElementById('password').value = '';
        document.getElementById('password').focus();
      }
    } catch (err) {
      showAlert('無法連接後端伺服器，請確認 npm run dev 是否正在執行');
    } finally {
      btn.disabled     = false;
      spinner.style.display = 'none';
      btnText.textContent   = '🔑 登入後台';
    }
  }
</script>
</body>
</html>
